<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My account — Toucan</title>
  <link rel="icon" href="images/toucan.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet" />

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Tailwind CDN with Toucan color tokens -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#fafaf7', surface: '#ffffff', surface2: '#f4f4f0',
            border: '#ecece8', border2: '#e0e0da',
            fg: '#1c1d21', fg2: '#3a3b41', fg3: '#6b6f76', fg4: '#9aa0a6',
            beak: '#f5c451', beakdeep: '#e9a93b', face: '#4f6db8', leaf: '#4e9e5e',
          },
          fontFamily: { sans: ['Inter', 'sans-serif'] },
        },
      },
    }
  </script>
</head>

<body class="bg-bg font-sans text-fg">

  <!-- ── HEADER ── -->
  <header class="sticky top-0 z-50 w-full border-b border-black/[0.08] backdrop-blur-xl"
    style="background: rgba(250,250,247,0.8)">
    <div class="mx-auto flex h-16 max-w-5xl items-center justify-between px-6">
      <a href="index.html" class="flex items-center gap-2.5 text-fg">
        <span class="flex h-8 w-8 items-center justify-center rounded-lg bg-[#eceae4] shadow-sm">
          <img src="images/toucan.png" alt="Toucan logo" width="175" height="200" class="h-6 w-6 object-contain" />
        </span>
        <span class="text-[16px] font-semibold tracking-tight">Toucan</span>
      </a>
      <button id="logout-btn"
        class="rounded-lg border border-border2 px-3.5 py-1.5 text-[13px] font-medium text-fg3 transition hover:bg-surface2 hover:text-fg">
        Log out
      </button>
    </div>
  </header>

  <!-- ── MAIN ── -->
  <main class="mx-auto max-w-3xl px-6 py-16">

    <!-- Loading state -->
    <div id="loading" class="text-[14px] text-fg3">Loading your account…</div>

    <!-- Account content (filled in by JS) -->
    <div id="account" class="hidden">
      <p class="text-[12px] font-semibold uppercase tracking-widest text-fg4">My account</p>
      <h1 class="mt-2 text-[clamp(1.75rem,3vw,2.25rem)] font-semibold tracking-tight">
        Hi, <span id="display-name">there</span> 👋
      </h1>
      <div class="mt-3 flex flex-wrap items-center gap-3 text-[14px] text-fg3">
        <span id="email-display"></span>
        <span id="role-badge" class="rounded-full px-2.5 py-0.5 text-[12px] font-semibold"></span>
      </div>

      <!-- Role-specific panel -->
      <div id="dashboard-panel" class="mt-10 rounded-2xl border border-border bg-surface p-8">
        <!-- filled in by JS based on role -->
      </div>
    </div>
  </main>

  <script>
    // ── Supabase setup ──
    const SUPABASE_URL  = 'https://avzvaemuvnieulukkyby.supabase.co'
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF2enZhZW11dm5pZXVsdWtreWJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4Njk1NDQsImV4cCI6MjA5NjQ0NTU0NH0.1K6omaUjfY5dqlUhwA9LSj53ewfiFknQN71dj5Kt3rU'
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON)

    const LOGIN_URL = new URL('login.html', window.location.href).href

    // ── On load: make sure someone is logged in, then load their profile ──
    init()

    async function init() {
      // getSession also picks up the session from the URL after a Google redirect
      const { data: { session } } = await db.auth.getSession()

      if (!session) {
        // Not logged in → bounce to the login page
        window.location.replace(LOGIN_URL)
        return
      }

      const user = session.user

      // Look up this user's profile row to get their role.
      // (The profile is auto-created by a database trigger at signup.)
      const { data: profile } = await db
        .from('profiles')
        .select('full_name, role')
        .eq('id', user.id)
        .single()

      const role = profile?.role || 'parent'
      const name = profile?.full_name || user.user_metadata?.full_name || user.email.split('@')[0]

      // Fill in the header info
      document.getElementById('display-name').textContent = name
      document.getElementById('email-display').textContent = user.email

      const badge = document.getElementById('role-badge')
      badge.textContent = role === 'tutor' ? 'Tutor' : 'Parent / Student'
      badge.classList.add(
        role === 'tutor' ? 'bg-face/15' : 'bg-leaf/15',
        role === 'tutor' ? 'text-face' : 'text-leaf',
      )

      // ─────────────────────────────────────────────────────────
      // ROLE-BASED ROUTING.
      // For now we just show a placeholder panel per role. Once the
      // dashboards are built, replace these panels with a redirect, e.g.:
      //   if (role === 'tutor')  window.location.replace('tutor.html')
      //   else                   window.location.replace('student.html')
      // ─────────────────────────────────────────────────────────
      const panel = document.getElementById('dashboard-panel')
      if (role === 'tutor') {
        panel.innerHTML = `
          <h2 class="text-[18px] font-semibold">Tutor dashboard</h2>
          <p class="mt-2 text-[14px] leading-relaxed text-fg3">
            Coming soon: add and remove your lesson slots, and see who's booked them.
          </p>
          <span class="mt-4 inline-block rounded-lg bg-surface2 px-3 py-1.5 text-[13px] text-fg3">🛠️ Under construction</span>`
      } else {
        panel.innerHTML = `
          <h2 class="text-[18px] font-semibold">Your lessons</h2>
          <p class="mt-2 text-[14px] leading-relaxed text-fg3">
            Coming soon: book new lessons and see the ones you've already booked, all in one place.
          </p>
          <a href="booking.html"
            class="mt-4 inline-block rounded-lg bg-beak px-5 py-2.5 text-[14px] font-semibold text-[#08090a] transition hover:bg-beakdeep">
            Book a lesson
          </a>`
      }

      // Show the content, hide the loading line
      document.getElementById('loading').classList.add('hidden')
      document.getElementById('account').classList.remove('hidden')
    }

    // ── Log out ──
    document.getElementById('logout-btn').addEventListener('click', async () => {
      await db.auth.signOut()
      window.location.replace(LOGIN_URL)
    })
  </script>

</body>
</html>
